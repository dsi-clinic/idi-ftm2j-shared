# Quality checks: runs on every PR and must pass before merge.
# Each job is a separate required status check for granular visibility.
name: Checks

on:
  pull_request:
    branches:
      - main
      - dev
      - release
      - 'release/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_DIR: .

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check . --output-format=concise

      - name: Format check (ruff)
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest --cov=idi_ftm2j_shared --cov=idi_ftm2j_shared_infra --cov-report=xml:coverage.xml --cov-report=term -v

  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          uv pip install pip-audit
          uv run pip-audit --desc --ignore-vuln CVE-2026-3219  # Pip vulnerability, no current fix

      - name: CodeQL Analysis Init
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: CodeQL Analysis Analyze
        uses: github/codeql-action/analyze@v4
