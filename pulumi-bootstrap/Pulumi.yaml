name: idi
runtime: python
description: Bootstrap IAM resources for GitHub Actions OIDC authentication

config:
  aws:region:
    description: AWS region to deploy to
    value: us-east-2

  idi:github_org:
    description: GitHub organization name
    value: "dsi-clinic"

  idi:app_name:
    description: Name of the application
    value: "ftm2j-shared"
