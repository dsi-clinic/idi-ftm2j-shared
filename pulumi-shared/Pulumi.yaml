name: idi
runtime: python
description: AWS ECS infrastructure for IDI Corporate Structure Pipeline

config:
  aws:region:
    description: AWS region to deploy to
    value: us-east-2

  idi:app_name:
    description: Name of the application
    default: "ftm2j-shared"

  idi:bucket_name:
    description: S3 bucket name for processor pipelines
    default: "processor-storage"

  idi:dlq_retention_days:
    description: SQS dead-letter queue retention in days
    default: "14"
